version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}'
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
      - goos: windows
        goarch: arm64
    main: ./cmd/veeam
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - format: zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--yes"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Veeam Terraform Provider {{ .Tag }}
  footer: |
    ## Installation
    
    ### Terraform Registry (Terraform 0.13+)
    
    ```hcl
    terraform {
      required_providers {
        veeam = {
          source  = "patrikcze/veeam"
          version = "~> {{ .Version }}"
        }
      }
    }
    ```
    
    ### Manual Installation
    
    1. Download the archive for your platform from the release assets
    2. Extract the binary to `~/.terraform.d/plugins/registry.terraform.io/patrikcze/veeam/{{ .Version }}/<os>_<arch>/`
    3. Run `terraform init`
    
    ## Verify Checksums
    
    ```bash
    curl -sLO https://github.com/patrikcze/terraform-provider-veeam/releases/download/{{ .Tag }}/{{ .ProjectName }}_{{ .Version }}_SHA256SUMS
    sha256sum -c {{ .ProjectName }}_{{ .Version }}_SHA256SUMS --ignore-missing
    ```
    
    ## Supported Platforms
    
    - Linux amd64 / arm64
    - macOS arm64 (Apple Silicon)
    - Windows amd64

changelog:
  disable: false
  sort: asc
  filters:
    exclude:
      - Merge pull request
      - Merge branch
      - go mod tidy
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999
