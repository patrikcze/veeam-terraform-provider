version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/patrikcze/terraform-provider-veeam

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocritic
    - revive
    - unparam

  disable:
    - exhaustruct
    - exhaustive
    - lll
    - nlreturn
    - wsl
    - funlen
    - gocognit
    - cyclop
    - gocyclo
    - maintidx
    - testpackage
    - paralleltest
    - tparallel
    - prealloc
    - wrapcheck
    - forcetypeassert
    - forbidigo
    - godot
    - godox
    - varnamelen
    - interfacebloat
    - containedctx
    - contextcheck
    - depguard
    - dupl
    - nonamedreturns
    - nolintlint
    - ireturn
    - tagliatelle
    - gosec
    - nestif
    - bodyclose
    - whitespace
    - grouper
    - importas
    - nilerr
    - nilnil
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - testifylint
    - thelper
    - wastedassign
    - usestdlibvars
    - zerologlint

  exclusions:
    # Exclude common unchecked-error patterns that are genuinely safe to ignore.
    rules:
      - text: "Error return value of .*(Close|Flush|Write|Encode|print|Remove|Setenv). is not checked"
        linters:
          - errcheck
      - text: "should have a package comment"
        linters:
          - revive
      # Test files: relax errcheck, unparam, and goconst.
      - path: "_test\\.go"
        linters:
          - errcheck
          - unparam
          - goconst

  settings:
    gocritic:
      enabled-checks:
        - yodaStyleExpr
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

issues:
  exclude-dirs:
    - vendor
    - bin
    - dist
  max-issues-per-linter: 0
  max-same-issues: 0
